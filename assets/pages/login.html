<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Catalyst</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="login-page">
    <nav>
        <div class="logo"><img src="../img/Logo.png" alt="Catalyst"></div>
        <div class="nav-links">
            <a href="../../index.html">Inicio</a>
            <a href="planes.html">Planes</a>
            <a href="blog.html">Blog</a>
            <a href="comunidad.html">Comunidad</a>
        </div>
    </nav>

    <main class="login-shell container">
        <div class="login-card">
            <p class="eyebrow">Portal de alumnos</p>
            <h1>Iniciar sesión</h1>
            <p class="page-intro">Accede rápido y sigue con el impulso correcto.</p>
            <form>
                <input type="email" class="form-input" placeholder="Correo electrónico" required>
                <input type="password" class="form-input" placeholder="Contraseña" required>
                <button type="submit" class="btn-accent">Entrar</button>
            </form>
            <div class="form-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="login-actions">
                <p class="login-footer">¿No tienes cuenta? <a href="../../index.html">Crea una aquí</a></p>
                <a class="btn-outline" href="../../index.html">← Volver al inicio</a>
            </div>
        </div>
    </main>
    <script src="../js/main.js"></script>
</body>
</html>
